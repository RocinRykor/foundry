# Session — auth, hub, squad, daily tribute, location
# namespace segment: session
# full prefix: warframe.log.session

# ─── AUTH / HUB ──────────────────────────────────────────────────────────────
# CONFIRMED: Background::OnLoginDone fires on every hub load, not just true login.

[[rules]]
signal_type = "hub.returned"
patterns = [
    { Regex = { matches = ["Script \\[Info\\]: Background\\.lua: Background::OnLoginDone\\(\\)"] } }
]

# CONFIRMED
[[rules]]
signal_type = "chat.irc.connected"
patterns = [
    { Regex = { matches = ["Net \\[Info\\]: IRC connected:"] } }
]

# ─── DAILY TRIBUTE ────────────────────────────────────────────────────────────
# CONFIRMED: DailyTribute.swf creation is the open signal
# CONFIRMED: "Wrapping up" is the close/complete signal

[[rules]]
signal_type = "dailytribute.started"
patterns = [
    { Regex = { matches = ["Created /Lotus/Interface/DailyTribute\\.swf"] } }
]

[[rules]]
signal_type = "dailytribute.completed"
patterns = [
    { Regex = { matches = ["DailyTribute\\.lua: DailyTribute: Wrapping up"] } }
]

# ─── SQUAD ───────────────────────────────────────────────────────────────────
# CONFIRMED: both lines observed across multiple logs

[[rules]]
signal_type = "squad.hosted"
patterns = [
    { Regex = { matches = ["Net \\[Info\\]: MatchingService::HostSquadSession"] } }
]

[[rules]]
signal_type = "squad.left"
patterns = [
    { Regex = { matches = ["Net \\[Info\\]: MatchingService::LeaveSquad"] } }
]

# ─── LOCATION ─────────────────────────────────────────────────────────────────
# CONFIRMED: Maroo's Bazaar identified via ThemedSquadOverlay mission name cache

[[rules]]
signal_type = "location.tradehub.entered"
patterns = [
    { Regex = { matches = ["ThemedSquadOverlay\\.lua: Cached mission name=Maroo's Bazaar"] } }
]
